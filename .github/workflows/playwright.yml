name: Playwright Personal Project

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm test

      - name: Generate Allure report
        if: always()
        run: npm run allure:report

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: error

      - name: Add Allure report link to summary
        if: always()
        run: |
          echo "### Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "The HTML dashboard is available as an artifact in this workflow run." >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: allure-report" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" >> $GITHUB_STEP_SUMMARY

  deploy-pages:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: ./allure-report

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4
        with:
          enablement: actions

      - name: Deploy Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          keep_files: false

      - name: Add GitHub Pages link to summary
        run: |
          echo "### View Allure Report" >> $GITHUB_STEP_SUMMARY
          echo "You can view the report directly at:" >> $GITHUB_STEP_SUMMARY
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
